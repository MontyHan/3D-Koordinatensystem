<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebXR VR Demo – Three.js</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #111; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff;
      font-family: system-ui, Arial, sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.35); padding: 8px 10px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">WebXR VR Demo: Drücke den Trigger, um die Box schneller zu drehen.</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/webxr/VRButton.js';

    let scene, camera, renderer, cube;
    const controllers = [];

    init();
    function init() {
      // Szene, Kamera, Renderer
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x202025);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.6, 3);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;

      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      // Licht
      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(3, 10, 10);
      scene.add(dir);

      // Boden
      const floorGeo = new THREE.PlaneGeometry(20, 20);
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x222228, metalness: 0.0, roughness: 1.0 });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      floor.receiveShadow = true;
      scene.add(floor);

      // Box
      const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
      const mat = new THREE.MeshStandardMaterial({ color: 0x3fa9f5, roughness: 0.4, metalness: 0.1 });
      cube = new THREE.Mesh(geo, mat);
      cube.position.set(0, 1.25, -1.5);
      scene.add(cube);

      // Controller (mit einfacher Strahllinie)
      for (let i = 0; i < 2; i++) {
        const controller = renderer.xr.getController(i);
        controller.addEventListener('selectstart', () => controller.userData.isSelecting = true);
        controller.addEventListener('selectend',   () => controller.userData.isSelecting = false);
        scene.add(controller);
        controllers.push(controller);

        const rayGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(0, 0, -1)
        ]);
        const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0xffffff }));
        ray.name = 'ray';
        ray.scale.z = 2;
        controller.add(ray);
      }

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(animate);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
      // langsame Rotation
      cube.rotation.y += 0.005;

      // bei Trigger schneller drehen + Farbe ändern
      let anySelecting = false;
      for (const c of controllers) {
        if (c.userData.isSelecting) {
          cube.rotation.y += 0.04;
          anySelecting = true;
        }
      }
      cube.material.color.setHex(anySelecting ? 0xff7f50 : 0x3fa9f5);

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
