
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytische Geometrie VR</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 10px;
      z-index: 10;
      max-width: 320px;
    }

    #vrFallback {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 20;
      padding: 12px 16px;
      background: #222;
      color: white;
      border: 1px solid #555;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div id="info">
  <b>Analytische Geometrie VR</b><br/>
  Trigger: Punkt / Auswahl<br/>
  X/A: Modus wechseln<br/>
  Linker Stick: Bewegung
</div>

<button id="vrFallback">Enter VR</button>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js';
import { XRControllerModelFactory } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/XRControllerModelFactory.js';

let scene, camera, renderer;
let controller;
let raycaster = new THREE.Raycaster();
let tempMatrix = new THREE.Matrix4();

let points = [];
let selected = [];
let mode = "point";
let snap = true;

const player = new THREE.Group();

init();
animate();

function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 4);

  player.add(camera);
  scene.add(player);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // 🔥 VR BUTTON (robust)
  const vrButton = VRButton.createButton(renderer);
  document.body.appendChild(vrButton);

  // 🔥 FALLBACK BUTTON (Pico Fix)
  const fallback = document.getElementById("vrFallback");

  fallback.onclick = async () => {
    if (!navigator.xr) return;
    const session = await navigator.xr.requestSession("immersive-vr");
    renderer.xr.setSession(session);
  };

  navigator.xr?.isSessionSupported?.("immersive-vr").then(supported => {
    if (!supported) fallback.style.display = "block";
  }).catch(() => {
    fallback.style.display = "block";
  });

  // Licht
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

  // Grid + Achsen
  scene.add(new THREE.GridHelper(40, 40));
  scene.add(new THREE.AxesHelper(5));

  // Controller
  controller = renderer.xr.getController(0);
  controller.addEventListener("selectstart", onSelect);
  scene.add(controller);

  window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "x") {
      mode = mode === "point" ? "line" : "point";
    }
  });

  window.addEventListener("resize", onResize);
}

function createPoint(pos) {

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffff00 })
  );

  mesh.position.copy(pos);
  scene.add(mesh);

  const label = createLabel(`(${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`);
  label.position.copy(pos.clone().add(new THREE.Vector3(0,0.2,0)));
  scene.add(label);

  points.push({ mesh, pos, label });
}

function createLabel(text) {

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 512;
  canvas.height = 128;

  ctx.fillStyle = "white";
  ctx.font = "28px Arial";
  ctx.fillText(text, 10, 60);

  const tex = new THREE.CanvasTexture(canvas);

  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
  sprite.scale.set(2, 0.5, 1);

  return sprite;
}

function onSelect() {

  tempMatrix.identity().extractRotation(controller.matrixWorld);

  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

  let pos = raycaster.ray.origin.clone().add(raycaster.ray.direction.multiplyScalar(3));

  if (snap) {
    pos.x = Math.round(pos.x * 2) / 2;
    pos.y = Math.round(pos.y * 2) / 2;
    pos.z = Math.round(pos.z * 2) / 2;
  }

  if (mode === "point") createPoint(pos);
  else selectForLine(pos);
}

function selectForLine(pos) {

  let nearest = null;
  let dist = 999;

  for (let p of points) {
    const d = p.pos.distanceTo(pos);
    if (d < 0.5 && d < dist) {
      dist = d;
      nearest = p;
    }
  }

  if (!nearest) return;

  selected.push(nearest);
  nearest.mesh.material.color.set(0xff0000);

  if (selected.length === 2) {

    const p1 = selected[0].pos;
    const p2 = selected[1].pos;

    const dir = p2.clone().sub(p1);

    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        p1.clone().add(dir.clone().multiplyScalar(-50)),
        p1.clone().add(dir.clone().multiplyScalar(50))
      ]),
      new THREE.LineBasicMaterial({ color: 0x00ffff })
    );

    scene.add(line);

    selected.forEach(p => p.mesh.material.color.set(0xffff00));
    selected = [];
  }
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function animate() {
  renderer.setAnimationLoop(() => renderer.render(scene, camera));
}

</script>

</body>
</html>
