<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytische Geometrie VR</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
      max-width: 320px;
    }
  </style>
</head>
<body>

<div id="info">
  <h2>Analytische Geometrie VR</h2>
  <p><strong>X/A:</strong> Modus wechseln</p>
  <p><strong>Trigger:</strong> Punkt setzen / Punkte auswählen</p>
  <p><strong>Linker Stick:</strong> Bewegung im Raum</p>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js';
import { XRControllerModelFactory } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/XRControllerModelFactory.js';

let scene, camera, renderer;
let controller1, controllerGrip1;
let raycaster;
let tempMatrix = new THREE.Matrix4();

let points = [];
let vectors = [];
let equations = [];
let selectedPoints = [];

let mode = 'point';
let snapEnabled = true;
let vectorsVisible = false;
let equationsVisible = true;

const moveSpeed = 0.05;
const player = new THREE.Group();

init();
animate();

function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 1.6, 4);

  player.add(camera);
  scene.add(player);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
  scene.add(light);

  const grid = new THREE.GridHelper(40, 40, 0x666666, 0x333333);
  scene.add(grid);

  const axes = new THREE.AxesHelper(5);
  scene.add(axes);

  createAxisLabel('X', new THREE.Vector3(5.5, 0, 0), 'red');
  createAxisLabel('Y', new THREE.Vector3(0, 5.5, 0), 'green');
  createAxisLabel('Z', new THREE.Vector3(0, 0, 5.5), 'blue');

  raycaster = new THREE.Raycaster();

  controller1 = renderer.xr.getController(0);
  controller1.addEventListener('selectstart', onSelect);
  controller1.addEventListener('connected', (event) => {
    controller1.gamepad = event.data.gamepad;
  });

  player.add(controller1);

  const controllerModelFactory = new XRControllerModelFactory();

  controllerGrip1 = renderer.xr.getControllerGrip(0);
  controllerGrip1.add(
    controllerModelFactory.createControllerModel(controllerGrip1)
  );

  player.add(controllerGrip1);

  const geometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-1)
  ]);

  const laser = new THREE.Line(
    geometry,
    new THREE.LineBasicMaterial({ color: 0xffffff })
  );

  laser.scale.z = 5;
  controller1.add(laser);

  createUIButton('Ortsvektoren', -1.5, toggleVectors);
  createUIButton('Geradengleichungen', 0, toggleEquations);
  createUIButton('Rasterfang', 1.5, toggleSnap);

  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onWindowResize);
}

function createAxisLabel(text, position, color) {

  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');

  canvas.width = 256;
  canvas.height = 256;

  context.fillStyle = color;
  context.font = '120px Arial';
  context.fillText(text, 80, 150);

  const texture = new THREE.CanvasTexture(canvas);

  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: texture })
  );

  sprite.position.copy(position);
  sprite.scale.set(1,1,1);

  scene.add(sprite);
}

function createTextSprite(message, color='white') {

  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');

  canvas.width = 1024;
  canvas.height = 256;

  context.fillStyle = color;
  context.font = '48px Arial';
  context.fillText(message, 20, 100);

  const texture = new THREE.CanvasTexture(canvas);

  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: texture })
  );

  sprite.scale.set(2.5,0.6,1);

  return sprite;
}

function createPoint(position) {

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.08,16,16),
    new THREE.MeshStandardMaterial({ color: 0xffff00 })
  );

  sphere.position.copy(position);
  scene.add(sphere);

  const index = points.length + 1;

  const label = createTextSprite(
    `P${index} (${position.x.toFixed(1)} | ${position.y.toFixed(1)} | ${position.z.toFixed(1)})`
  );

  label.position.copy(position.clone().add(new THREE.Vector3(0,0.2,0)));
  scene.add(label);

  const pointData = {
    mesh: sphere,
    label,
    position
  };

  points.push(pointData);

  createVector(pointData);
}

function createVector(pointData) {

  const dir = pointData.position.clone();
  const length = dir.length();

  const arrow = new THREE.ArrowHelper(
    dir.clone().normalize(),
    new THREE.Vector3(0,0,0),
    length,
    0xffffff
  );

  arrow.visible = vectorsVisible;

  scene.add(arrow);
  vectors.push(arrow);
}

function createLine(p1, p2) {

  const color = new THREE.Color().setHSL(Math.random(), 1, 0.5);

  const direction = p2.clone().sub(p1).normalize();

  const start = p1.clone().sub(direction.clone().multiplyScalar(50));
  const end = p1.clone().add(direction.clone().multiplyScalar(50));

  const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);

  const line = new THREE.Line(
    geometry,
    new THREE.LineBasicMaterial({ color })
  );

  scene.add(line);

  const dir = p2.clone().sub(p1);

  const eq = createTextSprite(
    `g: x = (${p1.x.toFixed(1)} / ${p1.y.toFixed(1)} / ${p1.z.toFixed(1)}) + t · (${dir.x.toFixed(1)} / ${dir.y.toFixed(1)} / ${dir.z.toFixed(1)})`,
    `#${color.getHexString()}`
  );

  eq.position.copy(p1.clone().add(new THREE.Vector3(0,0.5,0)));
  eq.visible = equationsVisible;

  scene.add(eq);
  equations.push(eq);
}

function onSelect() {

  tempMatrix.identity().extractRotation(controller1.matrixWorld);

  raycaster.ray.origin.setFromMatrixPosition(controller1.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

  const position = raycaster.ray.origin.clone().add(
    raycaster.ray.direction.clone().multiplyScalar(3)
  );

  if (snapEnabled) {
    position.x = Math.round(position.x * 2) / 2;
    position.y = Math.round(position.y * 2) / 2;
    position.z = Math.round(position.z * 2) / 2;
  }

  if (mode === 'point') {
    createPoint(position);
  }

  else {

    const nearest = findNearestPoint(position);

    if (!nearest) return;

    nearest.mesh.material.color.set(0xff0000);

    selectedPoints.push(nearest);

    if (selectedPoints.length === 2) {

      createLine(
        selectedPoints[0].position,
        selectedPoints[1].position
      );

      selectedPoints.forEach(p => {
        p.mesh.material.color.set(0xffff00);
      });

      selectedPoints = [];
    }
  }
}

function findNearestPoint(position) {

  let nearest = null;
  let minDist = Infinity;

  points.forEach(point => {

    const d = point.position.distanceTo(position);

    if (d < minDist && d < 0.5) {
      minDist = d;
      nearest = point;
    }
  });

  return nearest;
}

function toggleVectors() {

  vectorsVisible = !vectorsVisible;

  vectors.forEach(v => {
    v.visible = vectorsVisible;
  });
}

function toggleEquations() {

  equationsVisible = !equationsVisible;

  equations.forEach(eq => {
    eq.visible = equationsVisible;
  });
}

function toggleSnap() {
  snapEnabled = !snapEnabled;
}

function createUIButton(text, x, callback) {

  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');

  canvas.width = 512;
  canvas.height = 128;

  context.fillStyle = '#222';
  context.fillRect(0,0,512,128);

  context.fillStyle = 'white';
  context.font = '40px Arial';
  context.fillText(text, 40, 80);

  const texture = new THREE.CanvasTexture(canvas);

  const button = new THREE.Mesh(
    new THREE.PlaneGeometry(1.2,0.3),
    new THREE.MeshBasicMaterial({ map: texture })
  );

  button.position.set(x, 2, -2);

  scene.add(button);
}

function onKeyDown(event) {

  if (event.key.toLowerCase() === 'x') {

    mode = mode === 'point' ? 'line' : 'point';

    console.log('Modus:', mode);
  }
}

function updateMovement() {

  if (!controller1 || !controller1.gamepad) return;

  const gamepad = controller1.gamepad;

  if (!gamepad.axes) return;

  const x = gamepad.axes[2] || 0;
  const y = gamepad.axes[3] || 0;

  player.position.x += x * moveSpeed;
  player.position.z += y * moveSpeed;
}

function onWindowResize() {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {

  updateMovement();

  renderer.render(scene, camera);
}

</script>

</body>
</html>
